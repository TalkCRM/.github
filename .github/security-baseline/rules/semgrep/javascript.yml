rules:
  # ── 인젝션: SQL/NoSQL/명령어/코드/LDAP ────────────────────────────────────
  - id: talkcrm-sql-injection-string-concat
    languages: [javascript, typescript]
    severity: ERROR
    message: >-
      [SQL 삽입] 사용자 입력을 문자열 결합으로 쿼리에 삽입하고 있습니다. 환자 개인정보(PII) DB에 대한
      SQL Injection으로 이어질 수 있습니다. Parameterized Query 또는 ORM 바인딩 변수를 사용하세요.
    patterns:
      - pattern-either:
          - pattern: $CONN.query($QUERY + $INPUT, ...)
          - pattern: $CONN.query(`...${$INPUT}...`, ...)
          - pattern: $CONN.execute($QUERY + $INPUT, ...)
          - pattern: $SEQ.query($QUERY + $INPUT, ...)
          - pattern: $SEQ.query(`...${$INPUT}...`, ...)
    metadata:
      kisa: "JS 시큐어코딩 가이드 - SQL 삽입"
      cwe: "CWE-89"
      owasp: "A03:2021 - Injection"
      references:
        - "https://www.kisa.or.kr/2060204/form?postSeq=14"
      confidence: HIGH
      category: security
      technology: [nodejs, express, mysql, sequelize]

  - id: talkcrm-nosql-injection-mongo
    languages: [javascript, typescript]
    severity: ERROR
    message: >-
      [NoSQL 삽입] 검증되지 않은 사용자 입력(req.query/req.body)이 MongoDB 쿼리 객체나 $where에
      그대로 전달됩니다. NoSQL Injection으로 환자 정보가 유출될 수 있습니다. 스키마 검증 및 타입 캐스팅 후
      바인딩 형태로 전달하세요.
    patterns:
      - pattern-either:
          - pattern: "$MODEL.find({ ..., $KEY: req.$SRC.$FIELD, ... })"
          - pattern: "$MODEL.findOne({ ..., $KEY: req.$SRC.$FIELD, ... })"
          - pattern: "$MODEL.find({ $where: $INPUT })"
          - pattern: "$COLLECTION.find({ ..., $KEY: req.$SRC.$FIELD, ... })"
      - metavariable-pattern:
          metavariable: $SRC
          patterns:
            - pattern-either:
                - pattern: query
                - pattern: body
                - pattern: params
    metadata:
      kisa: "JS 시큐어코딩 가이드 - NoSQL 삽입"
      cwe: "CWE-943"
      owasp: "A03:2021 - Injection"
      confidence: MEDIUM
      category: security
      technology: [nodejs, mongodb, mongoose]

  - id: talkcrm-eval-function-dynamic-code
    languages: [javascript, typescript]
    severity: ERROR
    message: >-
      [코드 삽입] eval() / new Function() / setTimeout·setInterval의 문자열 인자로 동적 코드를
      실행하고 있습니다. 외부 입력이 섞이면 임의 코드 실행(RCE)으로 이어집니다. 동적 실행 함수 사용을
      금지하고 불가피할 경우 화이트리스트로 제한하세요.
    patterns:
      - pattern-either:
          - pattern: eval(...)
          - pattern: new Function(...)
          - pattern: setTimeout("...", ...)
          - pattern: setInterval("...", ...)
    metadata:
      kisa: "JS 시큐어코딩 가이드 - 코드 삽입"
      cwe: "CWE-95"
      owasp: "A03:2021 - Injection"
      confidence: HIGH
      category: security

  - id: talkcrm-os-command-injection
    languages: [javascript, typescript]
    severity: ERROR
    message: >-
      [운영체제 명령어 삽입] child_process.exec/execSync에 사용자 입력을 문자열 결합으로 전달합니다.
      OS Command Injection으로 서버 전체가 장악될 수 있습니다. execFile/spawn으로 명령어와 인자를
      분리하고, 허용 명령어를 화이트리스트로 제한하세요.
    patterns:
      - pattern-either:
          - pattern: child_process.exec($CMD + $INPUT, ...)
          - pattern: child_process.exec(`...${$INPUT}...`, ...)
          - pattern: exec($CMD + $INPUT, ...)
          - pattern: exec(`...${$INPUT}...`, ...)
          - pattern: execSync($CMD + $INPUT)
          - pattern: execSync(`...${$INPUT}...`)
    metadata:
      kisa: "JS 시큐어코딩 가이드 - 운영체제 명령어 삽입"
      cwe: "CWE-78"
      owasp: "A03:2021 - Injection"
      confidence: HIGH
      category: security
      technology: [nodejs]

  - id: talkcrm-ldap-injection
    languages: [javascript, typescript]
    severity: ERROR
    message: >-
      [LDAP 삽입] 사용자 입력을 LDAP 검색 필터 문자열에 직접 결합하고 있습니다. LDAP Injection으로
      인증 우회 및 디렉터리 정보 유출이 가능합니다. 특수문자(=,+,<,>,#,;,*,(,))를 이스케이프하거나
      ldapjs의 parseFilter()/화이트리스트 검증을 사용하세요.
    patterns:
      - pattern-either:
          - pattern: $CLIENT.search($BASE + $INPUT, ...)
          - pattern: $CLIENT.search(`...${$INPUT}...`, ...)
    metadata:
      kisa: "JS 시큐어코딩 가이드 - LDAP 삽입"
      cwe: "CWE-90"
      owasp: "A03:2021 - Injection"
      confidence: MEDIUM
      category: security
      technology: [ldapjs]

  # ── 경로조작 / SSRF ──────────────────────────────────────────────────────
  - id: talkcrm-path-traversal-fs
    languages: [javascript, typescript]
    severity: ERROR
    message: >-
      [경로 조작 및 자원 삽입] req로부터 받은 값으로 조합한 경로를 검증 없이 fs API에 전달합니다.
      '../' 등의 경로 이동 문자열로 임의 파일(환자 진료기록 등)을 읽거나 쓸 수 있습니다. path.normalize +
      허용 디렉터리 경계 검증(path.resolve로 시작 경로 비교)을 적용하세요.
    patterns:
      - pattern-either:
          - pattern: fs.readFile($BASE + req.$SRC.$FIELD, ...)
          - pattern: fs.readFileSync($BASE + req.$SRC.$FIELD, ...)
          - pattern: fs.createReadStream($BASE + req.$SRC.$FIELD, ...)
          - pattern: fs.writeFile($BASE + req.$SRC.$FIELD, ...)
          - pattern: fs.readFile(`...${req.$SRC.$FIELD}...`, ...)
          - pattern: fs.createReadStream(`...${req.$SRC.$FIELD}...`, ...)
    metadata:
      kisa: "JS 시큐어코딩 가이드 - 경로 조작 및 자원 삽입"
      cwe: "CWE-22"
      owasp: "A01:2021 - Broken Access Control"
      confidence: MEDIUM
      category: security
      technology: [nodejs]

  - id: talkcrm-ssrf-unvalidated-url
    languages: [javascript, typescript]
    severity: ERROR
    message: >-
      [서버사이드 요청 위조(SSRF)] 외부 입력값을 목적지 URL로 삼아 axios/http/fetch 요청을 직접
      호출합니다. 내부망(localhost, 169.254.169.254 등) 접근이나 내부 API 정보 유출로 이어질 수
      있습니다. 목적지 도메인/IP를 화이트리스트로 검증하고 내부망 접근을 차단하세요.
    patterns:
      - pattern-either:
          - pattern: axios.get(req.$SRC.$FIELD, ...)
          - pattern: axios.post(req.$SRC.$FIELD, ...)
          - pattern: "axios($OBJ, { url: req.$SRC.$FIELD, ... })"
          - pattern: http.get(req.$SRC.$FIELD, ...)
          - pattern: https.get(req.$SRC.$FIELD, ...)
          - pattern: fetch(req.$SRC.$FIELD, ...)
    metadata:
      kisa: "JS 시큐어코딩 가이드 - 서버사이드 요청 위조(SSRF)"
      cwe: "CWE-918"
      owasp: "A10:2021 - SSRF"
      confidence: MEDIUM
      category: security
      technology: [nodejs, axios]

  # ── XSS ─────────────────────────────────────────────────────────────────
  - id: talkcrm-xss-innerhtml-assignment
    languages: [javascript, typescript]
    severity: ERROR
    message: >-
      [크로스사이트 스크립트(XSS)] 검증되지 않은 값을 innerHTML/outerHTML에 대입하고 있습니다.
      키오스크/CRM 화면에서 환자 입력값이 그대로 렌더링되면 저장형 XSS로 세션 탈취가 가능합니다.
      textContent/innerText를 사용하거나 DOMPurify 등으로 살균 후 삽입하세요.
    patterns:
      - pattern-either:
          - pattern: $EL.innerHTML = $VAL
          - pattern: $EL.outerHTML = $VAL
      - pattern-not: $EL.innerHTML = ""
      - pattern-not: $EL.innerHTML = DOMPurify.sanitize(...)
    metadata:
      kisa: "JS 시큐어코딩 가이드 - 크로스사이트 스크립트"
      cwe: "CWE-79"
      owasp: "A03:2021 - Injection"
      confidence: MEDIUM
      category: security

  - id: talkcrm-xss-document-write
    languages: [javascript, typescript]
    severity: ERROR
    message: >-
      [크로스사이트 스크립트(XSS)] document.write()에 동적 값을 전달하고 있습니다. 신뢰할 수 없는
      입력이 섞이면 XSS로 이어집니다. DOM API(textContent 등)로 대체하세요.
    patterns:
      - pattern-either:
          - pattern: document.write($VAL)
          - pattern: document.writeln($VAL)
    metadata:
      kisa: "JS 시큐어코딩 가이드 - 크로스사이트 스크립트"
      cwe: "CWE-79"
      owasp: "A03:2021 - Injection"
      confidence: MEDIUM
      category: security

  - id: talkcrm-xss-express-unsanitized-response
    languages: [javascript, typescript]
    severity: WARNING
    message: >-
      [크로스사이트 스크립트(XSS)] Express 응답(res.send/res.write)에 req로부터 받은 값을 살균 없이
      그대로 반환합니다. Reflected XSS로 이어질 수 있습니다. HTML 인코딩 후 반환하거나 res.json으로
      데이터만 반환하세요.
    patterns:
      - pattern-either:
          - pattern: res.send(req.$SRC.$FIELD)
          - pattern: res.send(`...${req.$SRC.$FIELD}...`)
          - pattern: res.write(req.$SRC.$FIELD)
    metadata:
      kisa: "JS 시큐어코딩 가이드 - 크로스사이트 스크립트"
      cwe: "CWE-79"
      owasp: "A03:2021 - Injection"
      confidence: LOW
      category: security
      technology: [express]

  # ── 하드코딩 시크릿 보조 룰 ──────────────────────────────────────────────
  - id: talkcrm-hardcoded-crypto-key-iv
    languages: [javascript, typescript]
    severity: ERROR
    message: >-
      [하드코드된 비밀번호/암호화 키] 소스코드 내 암호화 키/IV/비밀번호로 보이는 문자열 상수가
      하드코딩되어 있습니다. 환자 데이터 암호화 키가 유출되면 전체 DB 복호화로 이어질 수 있습니다.
      환경변수 또는 KMS/Secrets Manager로 분리하세요.
    patterns:
      - pattern-either:
          - pattern: const $KEY = "..."
          - pattern: let $KEY = "..."
          - pattern: $OBJ.key = "..."
          - pattern: $OBJ.iv = "..."
          - pattern: $OBJ.password = "..."
          - pattern: $OBJ.secret = "..."
      - metavariable-regex:
          metavariable: $KEY
          regex: (?i)(secret|apikey|api_key|password|passwd|pwd|token|privatekey|private_key|encryptionkey|encryption_key)
    metadata:
      kisa: "JS 시큐어코딩 가이드 - 하드코드된 비밀번호/암호화 키"
      cwe: "CWE-798"
      owasp: "A02:2021 - Cryptographic Failures"
      confidence: MEDIUM
      category: security
      note: "gitleaks 등 전용 시크릿 스캐너를 보조하는 룰. 오탐 시 pattern-not-regex로 테스트 픽스처 예외 처리 권장."

  - id: talkcrm-hardcoded-db-connection-string
    languages: [javascript, typescript]
    severity: ERROR
    message: >-
      [하드코드된 비밀번호/암호화 키] DB 접속 문자열(mongodb://, mysql://, postgres:// 등)에
      자격증명이 평문으로 포함된 채 소스코드에 하드코딩되어 있습니다. 환경변수(process.env)로
      분리하세요.
    patterns:
      - pattern-either:
          - pattern: "\"mongodb://$USER:$PASS@...\""
          - pattern: "\"mongodb+srv://$USER:$PASS@...\""
          - pattern: "\"mysql://$USER:$PASS@...\""
          - pattern: "\"postgres://$USER:$PASS@...\""
          - pattern: "\"postgresql://$USER:$PASS@...\""
    metadata:
      kisa: "JS 시큐어코딩 가이드 - 하드코드된 비밀번호/암호화 키"
      cwe: "CWE-798"
      owasp: "A02:2021 - Cryptographic Failures"
      confidence: HIGH
      category: security

  # ── 약한 암호화 ─────────────────────────────────────────────────────────
  - id: talkcrm-weak-crypto-algorithm
    languages: [javascript, typescript]
    severity: ERROR
    message: >-
      [취약한 암호화 알고리즘 사용] DES/3DES/RC4/MD5/SHA1과 같이 표준 이하의 알고리즘을 사용하고
      있습니다. 환자 개인정보 암호화·해시에는 부적합하며 충돌/키복원 공격에 취약합니다. 대칭키는
      AES-256, 해시는 SHA-256 이상을 사용하세요.
    patterns:
      - pattern-either:
          - pattern: crypto.createCipheriv("des", ...)
          - pattern: crypto.createCipheriv("des-ede3", ...)
          - pattern: crypto.createCipheriv("rc4", ...)
          - pattern: crypto.createHash("md5")
          - pattern: crypto.createHash("sha1")
          - pattern: crypto.createCipher("des", ...)
          - pattern: crypto.createCipher("rc4", ...)
    metadata:
      kisa: "JS 시큐어코딩 가이드 - 취약한 암호화 알고리즘 사용"
      cwe: "CWE-327"
      owasp: "A02:2021 - Cryptographic Failures"
      confidence: HIGH
      category: security
      technology: [nodejs, crypto]

  - id: talkcrm-crypto-createcipher-deprecated
    languages: [javascript, typescript]
    severity: WARNING
    message: >-
      [취약한 암호화 알고리즘 사용] deprecated된 crypto.createCipher/createDecipher는 내부적으로
      약한 키 유도(고정 IV, 단순 해시 기반)를 사용해 안전하지 않습니다. crypto.createCipheriv/
      createDecipheriv와 랜덤 IV를 사용하세요.
    patterns:
      - pattern-either:
          - pattern: crypto.createCipher(...)
          - pattern: crypto.createDecipher(...)
    metadata:
      kisa: "JS 시큐어코딩 가이드 - 충분하지 않은 키 길이/취약한 암호화"
      cwe: "CWE-326"
      owasp: "A02:2021 - Cryptographic Failures"
      confidence: HIGH
      category: security
      technology: [nodejs, crypto]

  - id: talkcrm-insecure-random-for-security
    languages: [javascript, typescript]
    severity: WARNING
    message: >-
      [충분하지 않은 키 길이/취약한 난수] Math.random()은 암호학적으로 안전하지 않은 의사난수
      생성기입니다. 토큰/세션ID/암호화 키 등 보안 목적에 사용 시 예측 가능하여 탈취될 수 있습니다.
      crypto.randomBytes() 또는 crypto.randomUUID()를 사용하세요.
    patterns:
      - pattern-either:
          - pattern: $TOKEN = Math.random()
          - pattern: crypto.createHash($ALG).update(Math.random())
    metadata:
      kisa: "JS 시큐어코딩 가이드 - 충분하지 않은 키 길이 사용"
      cwe: "CWE-338"
      owasp: "A02:2021 - Cryptographic Failures"
      confidence: LOW
      category: security

  # ── 쿠키/세션 ────────────────────────────────────────────────────────────
  - id: talkcrm-cookie-missing-secure-httponly
    languages: [javascript, typescript]
    severity: ERROR
    message: >-
      [쿠키를 통한 중요정보 노출] res.cookie() 호출에 secure/httpOnly 옵션이 없거나 false로
      설정되어 있습니다. 세션 쿠키가 평문 HTTP로 전송되거나 클라이언트 스크립트(XSS)로 탈취될 수
      있습니다. { secure: true, httpOnly: true, sameSite: 'strict' }를 명시하세요.
    patterns:
      - pattern-either:
          - pattern: res.cookie($NAME, $VAL)
          - pattern: res.cookie($NAME, $VAL, { ... })
      - pattern-not: res.cookie($NAME, $VAL, { ..., secure, httpOnly, ... })
      - pattern-not: "res.cookie($NAME, $VAL, { ..., secure: true, httpOnly: true, ... })"
    metadata:
      kisa: "JS 시큐어코딩 가이드 - 쿠키를 통한 중요정보 노출/세션-쿠키 설정 미비"
      cwe: "CWE-614"
      owasp: "A05:2021 - Security Misconfiguration"
      confidence: MEDIUM
      category: security
      technology: [express]

  - id: talkcrm-cookie-excessive-maxage
    languages: [javascript, typescript]
    severity: WARNING
    message: >-
      [세션-쿠키 설정 미비] 쿠키 만료시간(maxAge)이 과도하게 길게 설정되어 있습니다(1년 이상 상당).
      탈취된 쿠키의 악용 가능 기간이 길어집니다. 업무 민감도에 맞춰 최소화하세요(중요기능 2~5분,
      저위험 15~30분 권장).
    patterns:
      - pattern: res.cookie($NAME, $VAL, $OPTS)
      - pattern-regex: "maxAge\\s*:\\s*(3[1-9]\\d{9}|[4-9]\\d{10}|\\d{12,})"
    metadata:
      kisa: "JS 시큐어코딩 가이드 - 세션-쿠키 설정 미비"
      cwe: "CWE-613"
      owasp: "A07:2021 - Identification and Authentication Failures"
      confidence: LOW
      category: security
      technology: [express]

  # ── CORS / JWT ──────────────────────────────────────────────────────────
  - id: talkcrm-cors-wildcard-origin
    languages: [javascript, typescript]
    severity: ERROR
    message: >-
      [CORS 설정 미비] Access-Control-Allow-Origin을 '*'로 설정하거나 cors() 미들웨어에서 origin을
      전체 허용하고 있습니다. 자격증명(쿠키/토큰)이 포함된 요청까지 임의 출처에서 허용되면 환자 PII가
      제3자 도메인으로 유출될 수 있습니다. 허용 출처를 화이트리스트로 명시하세요.
    patterns:
      - pattern-either:
          - pattern: res.header("Access-Control-Allow-Origin", "*")
          - pattern: res.setHeader("Access-Control-Allow-Origin", "*")
          - pattern: res.set("Access-Control-Allow-Origin", "*")
          - pattern: "cors({ origin: \"*\", ... })"
          - pattern: "cors({ origin: true, ... })"
    metadata:
      kisa: "소프트웨어 개발보안 가이드 - 접근제어/설정 관리"
      cwe: "CWE-942"
      owasp: "A05:2021 - Security Misconfiguration"
      confidence: HIGH
      category: security
      technology: [express, cors]

  - id: talkcrm-jwt-none-algorithm-or-unverified
    languages: [javascript, typescript]
    severity: ERROR
    message: >-
      [부적절한 인증] JWT를 'none' 알고리즘으로 서명하거나, jwt.decode()로만 파싱하고 서명 검증
      (jwt.verify)을 생략하고 있습니다. 공격자가 서명 없이 토큰을 위조해 인증을 우회할 수 있습니다.
      jwt.verify()로 명시적 알고리즘(HS256/RS256 등)을 검증하고 'none'을 알고리즘 목록에서
      제외하세요.
    patterns:
      - pattern-either:
          - pattern: "jwt.sign($PAYLOAD, $SECRET, { ..., algorithm: \"none\", ... })"
          - pattern: "jwt.verify($TOKEN, $SECRET, { ..., algorithms: [..., \"none\", ...], ... })"
          - pattern: jwt.decode($TOKEN)
    metadata:
      kisa: "소프트웨어 개발보안 가이드 - 부적절한 인가/인증"
      cwe: "CWE-347"
      owasp: "A07:2021 - Identification and Authentication Failures"
      confidence: MEDIUM
      category: security
      technology: [jsonwebtoken]

  # ── 에러/예외 처리 ──────────────────────────────────────────────────────
  - id: talkcrm-error-stacktrace-exposure
    languages: [javascript, typescript]
    severity: WARNING
    message: >-
      [오류 메시지를 통한 정보노출] err 객체(스택 트레이스 포함)를 그대로 클라이언트 응답으로
      반환하고 있습니다. 내부 구조/DB 스키마/파일 경로 등이 노출되어 추가 공격의 단서가 됩니다.
      클라이언트에는 일반 안내 메시지만 반환하고 상세 오류는 서버 로그에만 기록하세요.
    patterns:
      - pattern-either:
          - pattern: res.send(err)
          - pattern: res.send(err.stack)
          - pattern: "res.json({ ..., error: err, ... })"
          - pattern: "res.json({ ..., stack: err.stack, ... })"
          - pattern: "res.render($VIEW, { ..., error: err, ... })"
    metadata:
      kisa: "JS 시큐어코딩 가이드 - 오류 메시지를 통한 정보노출"
      cwe: "CWE-209"
      owasp: "A05:2021 - Security Misconfiguration"
      confidence: MEDIUM
      category: security
      technology: [express]

  - id: talkcrm-empty-catch-block
    languages: [javascript, typescript]
    severity: WARNING
    message: >-
      [부적절한 예외처리] catch 블록이 비어 있어 예외를 무시하고 있습니다. 인증/암호화/DB 접근 실패가
      은폐되어 오작동이나 보안 이슈가 조용히 누락될 수 있습니다. 최소한 로깅과 안전한 흐름 종료/복구
      로직을 구현하세요.
    patterns:
      - pattern: |
          try { ... } catch ($ERR) { }
    metadata:
      kisa: "JS 시큐어코딩 가이드 - 부적절한 예외처리"
      cwe: "CWE-390"
      owasp: "A09:2021 - Security Logging and Monitoring Failures"
      confidence: MEDIUM
      category: security

  # ── XXE ─────────────────────────────────────────────────────────────────
  - id: talkcrm-xxe-libxmljs-noent-true
    languages: [javascript, typescript]
    severity: ERROR
    message: >-
      [부적절한 XML 외부개체 참조(XXE)] libxmljs.parseXmlString() 호출 시 noent 옵션이 명시적으로
      비활성화되지 않았습니다. 외부 엔티티/DTD 로드가 허용되면 서버 내부 파일 읽기나 SSRF로 이어질 수
      있습니다. { noent: false, dtdload: false }를 명시하세요.
    patterns:
      - pattern-either:
          - pattern: libxmljs.parseXmlString($XML)
          - pattern: libxmljs.parseXmlString($XML, { ..., noent, true, ... })
      - pattern-not: libxmljs.parseXmlString($XML, { ..., noent, false, ... })
    metadata:
      kisa: "JS 시큐어코딩 가이드 - 부적절한 XML 외부개체 참조(XXE)"
      cwe: "CWE-611"
      owasp: "A05:2021 - Security Misconfiguration"
      confidence: LOW
      category: security
      technology: [libxmljs]

  # ── 파일 업로드 ─────────────────────────────────────────────────────────
  - id: talkcrm-file-upload-unvalidated
    languages: [javascript, typescript]
    severity: WARNING
    message: >-
      [위험한 형식 파일 업로드] req.files를 확장자/MIME 타입 검증 없이 원본 파일명으로 그대로
      저장하고 있습니다. 실행 가능한 파일(.js/.php/.jsp 등)이 업로드되어 웹쉘 실행으로 이어질 수
      있습니다. 화이트리스트 MIME/확장자 검증, 웹 루트 외부 저장, 파일명 난독화를 적용하세요.
    patterns:
      - pattern-either:
          - pattern: req.files.$FILE.mv($PATH + req.files.$FILE.name, ...)
          - pattern: req.files.$FILE.mv(`...${req.files.$FILE.name}...`, ...)
    metadata:
      kisa: "JS 시큐어코딩 가이드 - 위험한 형식 파일 업로드"
      cwe: "CWE-434"
      owasp: "A04:2021 - Insecure Design"
      confidence: LOW
      category: security
      technology: [express-fileupload]
