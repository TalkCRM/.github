  # 16. Open Redirect - 외부 입력을 그대로 redirect 대상으로 사용
  - id: talkcrm-python-open-redirect
    message: >-
      사용자 입력(request.args/GET/POST/form)을 검증 없이 redirect() 인자로 전달하고 있습니다.
      공격자가 피싱 사이트로 유도하는 Open Redirect가 가능합니다. 서버 측 화이트리스트로 목적지를
      제한하거나, 스킴/호스트가 배제된 상대 경로만 허용하세요.
    severity: WARNING
    languages: [python]
    patterns:
      - pattern-either:
          - pattern: redirect(request.args.get(...))
          - pattern: redirect(request.GET.get(...))
          - pattern: redirect(request.POST.get(...))
          - pattern: redirect(request.form.get(...))
          - pattern: redirect(request.args[...])
          - pattern: redirect(request.GET[...])
    metadata:
      category: security
      cwe: "CWE-601: URL Redirection to Untrusted Site (Open Redirect)"
      owasp: "A01:2021 - Broken Access Control"
      references:
